name: ✅ Avaluació Automàtica Java B2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────
  # Job: Compilar i executar tots els tests
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Tests — ${{ matrix.module }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false        # Executa tots els mòduls fins i tot si un falla
      matrix:
        module:
          - tema1-poo
          - tema3-sql
          - tema4-jdbc
          - tema6-excepcions

    steps:
      # 1. Descarregar el codi
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Configurar JDK 21
      - name: ☕ Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'        # Caché del repositori Maven local (~/.m2)

      # 3. Compilar el mòdul pare (instal·la el POM parent)
      - name: 📦 Instal·lar POM parent
        run: mvn install -N --no-transfer-progress

      # 4. Executar tests del mòdul específic
      - name: 🧪 Executar tests de ${{ matrix.module }}
        run: mvn test --no-transfer-progress -pl ${{ matrix.module }}
        continue-on-error: false  # El job falla si hi ha tests que fallen

      # 5. Publicar resultats dels tests a GitHub (Summary + annotations)
      - name: 📊 Publicar resultats
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()             # Sempre publica, fins i tot si els tests fallen
        with:
          files: '${{ matrix.module }}/target/surefire-reports/*.xml'
          comment_title: '🧪 Resultats Tests — ${{ matrix.module }}'
          check_name: 'Tests ${{ matrix.module }}'

      # 6. Pujar els informes com a artefacte (opcional, per descarregar)
      - name: 📁 Guardar informes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.module }}
          path: ${{ matrix.module }}/target/surefire-reports/
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job de resum: mostra el resultat global
  # ──────────────────────────────────────────────
  summary:
    name: 📈 Resum Global
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: ✅ Tots els mòduls passats
        if: ${{ needs.test.result == 'success' }}
        run: |
          echo "🎉 Tots els tests han passat correctament!"
          echo "Bon treball! Tots els exercicis estan implementats correctament."

      - name: ❌ Hi ha mòduls amb errors
        if: ${{ needs.test.result != 'success' }}
        run: |
          echo "⚠️ Alguns tests han fallat."
          echo "Revisa cada mòdul per veure quins tests no han passat."
          echo "Consulta els informes a la secció 'Artifacts' d'aquest workflow."
          exit 1
